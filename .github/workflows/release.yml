name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      release_version: ${{ steps.version.outputs.release_version }}
      release_sha: ${{ steps.release_sha.outputs.release_sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update package.json version
        run: node scripts/updatePackageJson.js

      - name: Read version
        id: version
        run: |
          VERSION="$(node -e "const packageJson = require('./package.json'); console.log(packageJson.version);")"
          echo "VERSION set to ${VERSION}"
          echo "release_version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit changes
        run: |
          git add -A
          git commit -m "release version ${{ steps.version.outputs.release_version }} [skip ci]"

      - name: Tag version
        run: |
          VERSION="${{ steps.version.outputs.release_version }}"
          git tag -f "${VERSION}"

      - name: Push commit and tag
        run: |
          git push origin HEAD:main --verbose
          git push origin --force "${{ steps.version.outputs.release_version }}"

      - name: Capture release sha
        id: release_sha
        run: |
          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  publish_server:
    name: Publish server image
    runs-on: ubuntu-latest
    needs: release
    if: github.ref == 'refs/heads/main'
    env:
      IMAGE_NAME_RELEASE_SERVER: cokoapps/ketty-server
      RELEASE_VERSION: ${{ needs.release.outputs.release_version }}
    steps:
      - name: Ensure release version exists
        run: |
          [ -z "${RELEASE_VERSION}" ] && exit 1

      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.release_sha }}
          fetch-depth: 0

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./packages/server
          file: ./packages/server/Dockerfile-production
          push: true
          tags: ${{ env.IMAGE_NAME_RELEASE_SERVER }}:${{ env.RELEASE_VERSION }}

  publish_client:
    name: Publish client image
    runs-on: ubuntu-latest
    needs: release
    if: github.ref == 'refs/heads/main'
    env:
      IMAGE_NAME_RELEASE_CLIENT: cokoapps/ketty-client
      RELEASE_VERSION: ${{ needs.release.outputs.release_version }}
    steps:
      - name: Ensure release version exists
        run: |
          [ -z "${RELEASE_VERSION}" ] && exit 1

      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.release_sha }}
          fetch-depth: 0

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./packages/client
          file: ./packages/client/Dockerfile-production
          push: true
          tags: ${{ env.IMAGE_NAME_RELEASE_CLIENT }}:${{ env.RELEASE_VERSION }}
